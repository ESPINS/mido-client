openapi: 3.0.0
info:
  version: 0.0.1
  title: channels-plus-channel-api
paths:
  /properties:
    get:
      operationId: listProperties
      description: >-
        Find properties that match given search criteria. The response is an
        array of properties sorted by distance (nearest to furthest) unless
        otherwise specified. Each property includes a recommended package of the
        best available non-deal room rate. If deal codes are included, the best
        available deal room rate for each supported deal code will also be
        provided.
      parameters:
        - $ref: '#/components/parameters/SmApiId'
        - $ref: '#/components/parameters/SmApiKey'
        - name: page
          description: The page number of the results to fetch
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
          x-gitbook-description-html: <p>The page number of the results to fetch</p>
        - name: perPage
          description: The number of results per page
          in: query
          schema:
            type: integer
            minimum: 0
            maximum: 100
            default: 20
            multipleOf: 10
          x-gitbook-description-html: <p>The number of results per page</p>
        - name: latitude
          description: >-
            Specify a longitude (as well as a latitude and radius) to do
            searches around a specific location.
          required: true
          in: query
          schema:
            type: number
            minimum: -90
            maximum: 90
          x-gitbook-description-html: >-
            <p>Specify a longitude (as well as a latitude and radius) to do
            searches around a specific location.</p>
        - name: longitude
          description: >-
            Specify a longitude (as well as a latitude and radius) to do
            searches around a specific location.
          required: true
          in: query
          schema:
            type: number
            minimum: -180
            maximum: 180
          x-gitbook-description-html: >-
            <p>Specify a longitude (as well as a latitude and radius) to do
            searches around a specific location.</p>
        - name: radius
          description: >-
            The radius in Km to search around the specified latitude and
            longitude. The minimum value (and the default) is 15 and the maximum
            is 100.
          in: query
          schema:
            type: number
            default: 15
            minimum: 15
            maximum: 100
          x-gitbook-description-html: >-
            <p>The radius in Km to search around the specified latitude and
            longitude. The minimum value (and the default) is 15 and the maximum
            is 100.</p>
        - name: checkin
          description: >-
            The arrival date. Must be within 500 days in the future and in the
            format yyyy-mm-dd.
          required: true
          in: query
          schema:
            type: string
            format: date
          x-gitbook-description-html: >-
            <p>The arrival date. Must be within 500 days in the future and in
            the format yyyy-mm-dd.</p>
        - name: checkout
          description: >-
            The departure date. Must be later than checkin. Must be between 1
            and 30 days after checkin. Must be within 500 days in the future and
            in the format yyyy-mm-dd.
          required: true
          in: query
          schema:
            type: string
            format: date
          x-gitbook-description-html: >-
            <p>The departure date. Must be later than checkin. Must be between 1
            and 30 days after checkin. Must be within 500 days in the future and
            in the format yyyy-mm-dd.</p>
        - name: rooms
          description: >-
            Use the rooms list specify exact occupants in each room. Do not use
            this if searching by totalAdults, totalChildren & totalRooms.
          in: query
          schema:
            type: array
            minItems: 1
            maxItems: 10
            items:
              type: object
              additionalProperties: false
              properties:
                adults:
                  type: integer
                  minimum: 0
                  maximum: 65535
                children:
                  type: integer
                  minimum: 0
                  maximum: 65535
              required:
                - adults
                - children
          x-gitbook-description-html: >-
            <p>Use the rooms list specify exact occupants in each room. Do not
            use this if searching by totalAdults, totalChildren &#x26;
            totalRooms.</p>
        - name: totalAdults
          description: >-
            Specify the total number of adults, must also specify totalRooms
            field. Do not use this if searching with occupants rooms list.
          in: query
          schema:
            type: integer
            minimum: 0
          x-gitbook-description-html: >-
            <p>Specify the total number of adults, must also specify totalRooms
            field. Do not use this if searching with occupants rooms list.</p>
        - name: totalChildren
          description: >-
            Specify the total number of children, must also specify totalRooms
            field. Do not use this if searching with occupants rooms list.
          in: query
          schema:
            type: integer
            minimum: 0
          x-gitbook-description-html: >-
            <p>Specify the total number of children, must also specify
            totalRooms field. Do not use this if searching with occupants rooms
            list.</p>
        - name: totalRooms
          description: >-
            Specify the total number of rooms, must also specify totalAdults
            and/or totalChildren fields. Do not use this if searching with
            occupants rooms list.
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 10
          x-gitbook-description-html: >-
            <p>Specify the total number of rooms, must also specify totalAdults
            and/or totalChildren fields. Do not use this if searching with
            occupants rooms list.</p>
        - name: sortBy
          description: Specify the sorting criteria for the results.
          in: query
          schema:
            type: string
            enum:
              - distance
              - name
            default: distance
          x-gitbook-description-html: <p>Specify the sorting criteria for the results.</p>
        - name: sortDirection
          description: Specify the sorting direction for the results.
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
            default: asc
          x-gitbook-description-html: <p>Specify the sorting direction for the results.</p>
        - name: minStarRating
          description: Minimum star rating for properties in the results.
          in: query
          schema:
            type: number
            enum:
              - 1
              - 1.5
              - 2
              - 2.5
              - 3
              - 3.5
              - 4
              - 4.5
              - 5
              - 5.5
              - 6
          x-gitbook-description-html: <p>Minimum star rating for properties in the results.</p>
        - name: maxStarRating
          description: Maximum star rating for properties in the results.
          in: query
          schema:
            type: number
            enum:
              - 1
              - 1.5
              - 2
              - 2.5
              - 3
              - 3.5
              - 4
              - 4.5
              - 5
              - 5.5
              - 6
          x-gitbook-description-html: <p>Maximum star rating for properties in the results.</p>
        - name: propertyType
          description: Limit search criteria to properties of a specific type.
          in: query
          schema:
            type: string
            maxLength: 255
          x-gitbook-description-html: <p>Limit search criteria to properties of a specific type.</p>
        - name: swimmingPoolAvailable
          description: Only return rates for properties that have a swimming pool.
          in: query
          schema:
            type: boolean
          x-gitbook-description-html: <p>Only return rates for properties that have a swimming pool.</p>
        - name: breakfastIncluded
          description: Only return rates with breakfast included.
          in: query
          schema:
            type: boolean
          x-gitbook-description-html: <p>Only return rates with breakfast included.</p>
        - name: freeCancellation
          description: Only return rates with free cancellation periods.
          in: query
          schema:
            type: boolean
          x-gitbook-description-html: <p>Only return rates with free cancellation periods.</p>
        - name: dealCodes
          description: return deal rate for properties that participates in the given deal
          in: query
          schema:
            type: array
            items:
              type: string
          x-gitbook-description-html: >-
            <p>return deal rate for properties that participates in the given
            deal</p>
        - name: dealOnly
          description: exclude properties that are not on the deal with the given dealCode
          in: query
          schema:
            type: boolean
          x-gitbook-description-html: >-
            <p>exclude properties that are not on the deal with the given
            dealCode</p>
        - name: language
          description: >-
            used to specify is preferred language to return and fallback to
            property's default language
          in: query
          schema:
            type: string
            enum:
              - de
              - en
              - es
              - fr
              - id
              - it
              - pt
              - th
          x-gitbook-description-html: >-
            <p>used to specify is preferred language to return and fallback to
            property's default language</p>
        - name: excludeSelfRated
          in: query
          description: Exclude self-rated properties from the response
          schema:
            type: boolean
          x-gitbook-description-html: <p>Exclude self-rated properties from the response</p>
      responses:
        '200':
          description: successful
          headers:
            x-sm-request-id:
              schema:
                type: string
              description: >-
                uuid of the request, useful to provide to SiteMinder when
                raising issues.
              x-gitbook-description-html: >-
                <p>uuid of the request, useful to provide to SiteMinder when
                raising issues.</p>
            x-sm-trace-token:
              schema:
                type: string
              description: >-
                uuid used for tracing, useful to provide to SiteMinder when
                raising issues.
              x-gitbook-description-html: >-
                <p>uuid used for tracing, useful to provide to SiteMinder when
                raising issues.</p>
            ratelimit-policy:
              schema:
                type: string
              description: >-
                Shows the number of request allowed per number of seconds
                window. e.g. '100;w=60' means 100 request in a 60 seconds
                window.
              x-gitbook-description-html: >-
                <p>Shows the number of request allowed per number of seconds
                window. e.g. '100;w=60' means 100 request in a 60 seconds
                window.</p>
            ratelimit-limit:
              schema:
                type: integer
              description: The number of requests allowed per window
              x-gitbook-description-html: <p>The number of requests allowed per window</p>
            ratelimit-remaining:
              schema:
                type: integer
              description: The number of requests left for the time window.
              x-gitbook-description-html: <p>The number of requests left for the time window.</p>
            ratelimit-reset:
              schema:
                type: integer
              description: The number of seconds left for the window to reset
              x-gitbook-description-html: <p>The number of seconds left for the window to reset</p>
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: false
                  properties:
                    uuid:
                      type: string
                      description: Unique identifier for the property.
                      x-gitbook-description-html: <p>Unique identifier for the property.</p>
                    name:
                      type: string
                      description: The name of the property.
                      x-gitbook-description-html: <p>The name of the property.</p>
                    propertyType:
                      $ref: '#/components/schemas/TranslationText'
                      description: The type of the property with language information.
                      x-gitbook-description-html: >-
                        <p>The type of the property with language
                        information.</p>
                    description:
                      $ref: '#/components/schemas/TranslationText'
                      description: A description of the property with language information.
                      x-gitbook-description-html: >-
                        <p>A description of the property with language
                        information.</p>
                    address:
                      type: string
                      description: The address of the property.
                      x-gitbook-description-html: <p>The address of the property.</p>
                    suburb:
                      type: string
                      description: The suburb where the property is located.
                      x-gitbook-description-html: <p>The suburb where the property is located.</p>
                    state:
                      type: string
                      description: The state or region where the property is located.
                      x-gitbook-description-html: >-
                        <p>The state or region where the property is
                        located.</p>
                    country:
                      type: string
                      description: The country where the property is located.
                      x-gitbook-description-html: <p>The country where the property is located.</p>
                    email:
                      type: string
                      description: The contact email for the property.
                      x-gitbook-description-html: <p>The contact email for the property.</p>
                    phoneNumber:
                      type: string
                      description: The contact phone number for the property.
                      x-gitbook-description-html: <p>The contact phone number for the property.</p>
                    language:
                      type: string
                      maxLength: 16
                      description: The primary language used by the property.
                      x-gitbook-description-html: <p>The primary language used by the property.</p>
                    latitude:
                      type: number
                      description: The latitude coordinate of the property.
                      x-gitbook-description-html: <p>The latitude coordinate of the property.</p>
                    longitude:
                      type: number
                      description: The longitude coordinate of the property.
                      x-gitbook-description-html: <p>The longitude coordinate of the property.</p>
                    checkinStartTime:
                      type: string
                      minLength: 1
                      maxLength: 10
                      description: The earliest time guests can check in.
                      x-gitbook-description-html: <p>The earliest time guests can check in.</p>
                    checkinEndTime:
                      type: string
                      minLength: 1
                      maxLength: 10
                      description: The latest time guests can check in.
                      x-gitbook-description-html: <p>The latest time guests can check in.</p>
                    checkoutEndTime:
                      type: string
                      minLength: 1
                      maxLength: 10
                      description: The latest time guests must check out.
                      x-gitbook-description-html: <p>The latest time guests must check out.</p>
                    starRating:
                      $ref: '#/components/schemas/StarRatings'
                      description: The star rating of the property.
                      x-gitbook-description-html: <p>The star rating of the property.</p>
                    currency:
                      type: string
                      description: The currency of the price
                      x-gitbook-description-html: <p>The currency of the price</p>
                    photo:
                      $ref: '#/components/schemas/Photo'
                      description: A photo representing the property.
                      x-gitbook-description-html: <p>A photo representing the property.</p>
                    amenities:
                      type: array
                      description: Amenities that are available at this property
                      items:
                        $ref: '#/components/schemas/TranslationText'
                      x-gitbook-description-html: <p>Amenities that are available at this property</p>
                    acceptedCardTypes:
                      type: array
                      description: accepted credit card types at this property
                      items:
                        type: string
                        enum:
                          - AX
                          - DN
                          - DS
                          - JC
                          - MC
                          - CU
                          - VI
                      minItems: 1
                      x-gitbook-description-html: <p>accepted credit card types at this property</p>
                    totalCommissionPercentage:
                      type: number
                      description: The total commission percentage for this property.
                      x-gitbook-description-html: >-
                        <p>The total commission percentage for this
                        property.</p>
                    siteminderCommissionPercentage:
                      type: number
                      description: SiteMinder's portion of the commission percentage.
                      x-gitbook-description-html: >-
                        <p>SiteMinder's portion of the commission
                        percentage.</p>
                    channelCommissionPercentage:
                      type: number
                      description: >-
                        The channel partner's portion of the commission
                        percentage.
                      x-gitbook-description-html: >-
                        <p>The channel partner's portion of the commission
                        percentage.</p>
                    rooms:
                      type: array
                      description: Available rooms and their details.
                      items:
                        type: object
                        additionalProperties: false
                        properties:
                          roomRateUuid:
                            type: string
                            description: Unique identifier for this room rate.
                            x-gitbook-description-html: <p>Unique identifier for this room rate.</p>
                          roomTypeName:
                            $ref: '#/components/schemas/TranslationText'
                            description: >-
                              The name of the room type with language
                              information.
                            x-gitbook-description-html: >-
                              <p>The name of the room type with language
                              information.</p>
                          roomTypeDescription:
                            $ref: '#/components/schemas/TranslationText'
                            description: >-
                              A description of the room type with language
                              information.
                            x-gitbook-description-html: >-
                              <p>A description of the room type with language
                              information.</p>
                          ratePlanName:
                            type: string
                            description: >-
                              The name of the rate plan for this room. For
                              Internal use only, not to be displayed to guests.
                            x-gitbook-description-html: >-
                              <p>The name of the rate plan for this room. For
                              Internal use only, not to be displayed to
                              guests.</p>
                          breakfastIncluded:
                            type: boolean
                            description: >-
                              Indicates whether breakfast is included in the
                              rate.
                            x-gitbook-description-html: >-
                              <p>Indicates whether breakfast is included in the
                              rate.</p>
                          roomArea:
                            type: string
                            description: >-
                              room area from room type with the unit of
                              measurement
                            nullable: true
                            x-gitbook-description-html: >-
                              <p>room area from room type with the unit of
                              measurement</p>
                          photo:
                            $ref: '#/components/schemas/Photo'
                            description: A photo of the room.
                            x-gitbook-description-html: <p>A photo of the room.</p>
                          amenities:
                            type: array
                            description: Amenities that are available at this property
                            items:
                              $ref: '#/components/schemas/TranslationText'
                            x-gitbook-description-html: >-
                              <p>Amenities that are available at this
                              property</p>
                          views:
                            type: array
                            description: Views that are available for this room type
                            items:
                              $ref: '#/components/schemas/TranslationText'
                            x-gitbook-description-html: <p>Views that are available for this room type</p>
                          bedConfigurations:
                            type: array
                            description: Bed configurations for this room type
                            items:
                              type: object
                              additionalProperties: false
                              properties:
                                bedCode:
                                  $ref: '#/components/schemas/TranslationText'
                                  description: The type of bed with language information.
                                  x-gitbook-description-html: >-
                                    <p>The type of bed with language
                                    information.</p>
                                quantity:
                                  type: number
                                  minimum: 1
                                  description: The number of beds of this type.
                                  x-gitbook-description-html: <p>The number of beds of this type.</p>
                            x-gitbook-description-html: <p>Bed configurations for this room type</p>
                          adults:
                            type: integer
                            description: The number of adults this rate is for.
                            x-gitbook-description-html: <p>The number of adults this rate is for.</p>
                          children:
                            type: integer
                            description: The number of children this rate is for.
                            x-gitbook-description-html: <p>The number of children this rate is for.</p>
                          cancellationPolicy:
                            $ref: '#/components/schemas/CancelationPolicy'
                            description: The cancellation policy for this room rate.
                            x-gitbook-description-html: <p>The cancellation policy for this room rate.</p>
                          prices:
                            type: array
                            description: >-
                              The pricing options for this room, including any
                              applicable deals.
                            items:
                              type: object
                              additionalProperties: false
                              properties:
                                totalPrice:
                                  type: number
                                  minimum: 0
                                  description: The total price for the stay.
                                  x-gitbook-description-html: <p>The total price for the stay.</p>
                                dealCode:
                                  type: string
                                  description: The code of any deal applied to this price.
                                  x-gitbook-description-html: >-
                                    <p>The code of any deal applied to this
                                    price.</p>
                                totalCommissionPercentage:
                                  type: number
                                  description: >-
                                    The total commission percentage for this
                                    specific rate.
                                  x-gitbook-description-html: >-
                                    <p>The total commission percentage for this
                                    specific rate.</p>
                                siteminderCommissionPercentage:
                                  type: number
                                  description: >-
                                    SiteMinder's portion of the commission for
                                    this rate.
                                  x-gitbook-description-html: >-
                                    <p>SiteMinder's portion of the commission
                                    for this rate.</p>
                                channelCommissionPercentage:
                                  type: number
                                  description: >-
                                    The channel partner's portion of the
                                    commission for this rate.
                                  x-gitbook-description-html: >-
                                    <p>The channel partner's portion of the
                                    commission for this rate.</p>
                              required:
                                - totalPrice
                                - totalCommissionPercentage
                                - siteminderCommissionPercentage
                                - channelCommissionPercentage
                            x-gitbook-description-html: >-
                              <p>The pricing options for this room, including
                              any applicable deals.</p>
                          lowInventory:
                            type: boolean
                            description: >-
                              Indicates whether this room type has low inventory
                              available.
                            x-gitbook-description-html: >-
                              <p>Indicates whether this room type has low
                              inventory available.</p>
                        required:
                          - roomRateUuid
                          - roomTypeName
                          - ratePlanName
                          - breakfastIncluded
                          - adults
                          - children
                          - cancellationPolicy
                          - prices
                          - lowInventory
                      x-gitbook-description-html: <p>Available rooms and their details.</p>
                    specialConditions:
                      $ref: '#/components/schemas/SpecialConditions'
                      description: Special conditions that apply to this property.
                      x-gitbook-description-html: <p>Special conditions that apply to this property.</p>
                    selfRated:
                      type: boolean
                      description: Indicates if the rating is self-rated
                      x-gitbook-description-html: <p>Indicates if the rating is self-rated</p>
                  required:
                    - uuid
                    - name
                    - address
                    - state
                    - country
                    - phoneNumber
                    - language
                    - latitude
                    - longitude
                    - currency
                    - checkinStartTime
                    - checkoutEndTime
                    - acceptedCardTypes
                    - totalCommissionPercentage
                    - siteminderCommissionPercentage
                    - channelCommissionPercentage
                    - rooms
                    - specialConditions
          x-gitbook-description-html: <p>successful</p>
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimitError'
        '500':
          $ref: '#/components/responses/ServerError'
      x-gitbook-description-document:
        object: document
        data:
          schemaVersion: 8
        nodes:
          - object: block
            type: paragraph
            isVoid: false
            data: {}
            nodes:
              - object: text
                leaves:
                  - object: leaf
                    text: >-
                      Find properties that match given search criteria. The
                      response is an array of properties sorted by distance
                      (nearest to furthest) unless otherwise specified. Each
                      property includes a recommended package of the best
                      available non-deal room rate. If deal codes are included,
                      the best available deal room rate for each supported deal
                      code will also be provided.
                    marks: []
      x-gitbook-description-html: >-
        <p>Find properties that match given search criteria. The response is an
        array of properties sorted by distance (nearest to furthest) unless
        otherwise specified. Each property includes a recommended package of the
        best available non-deal room rate. If deal codes are included, the best
        available deal room rate for each supported deal code will also be
        provided.</p>
  /properties/{uuid}:
    get:
      operationId: showProperty
      description: >-
        Get detailed information and room rates for a specific property that
        satisfies the given search criteria. This endpoint provides more
        comprehensive data about a single property, including its room types and
        available rates.
      parameters:
        - $ref: '#/components/parameters/SmApiId'
        - $ref: '#/components/parameters/SmApiKey'
        - name: uuid
          description: The unique identifier of the property
          required: true
          in: path
          schema:
            type: string
          x-gitbook-description-html: <p>The unique identifier of the property</p>
        - name: checkin
          description: >-
            The arrival date. Must be within 500 days in the future and in the
            format yyyy-mm-dd.
          required: true
          in: query
          schema:
            type: string
            format: date
          x-gitbook-description-html: >-
            <p>The arrival date. Must be within 500 days in the future and in
            the format yyyy-mm-dd.</p>
        - name: checkout
          description: >-
            The departure date. Must be later than checkin. Must be between 1
            and 30 days after checkin. Must be within 500 days in the future and
            in the format yyyy-mm-dd.
          required: true
          in: query
          schema:
            type: string
            format: date
          x-gitbook-description-html: >-
            <p>The departure date. Must be later than checkin. Must be between 1
            and 30 days after checkin. Must be within 500 days in the future and
            in the format yyyy-mm-dd.</p>
        - name: rooms
          description: >-
            Use the rooms list to specify exact occupants in each room. Provides
            more accurate pricing. Do not use this if searching by totalAdults,
            totalChildren & totalRooms.
          in: query
          schema:
            type: array
            minItems: 1
            maxItems: 10
            items:
              type: object
              additionalProperties: false
              properties:
                adults:
                  type: integer
                  minimum: 0
                  maximum: 65535
                  description: Number of adults in the room
                  x-gitbook-description-html: <p>Number of adults in the room</p>
                children:
                  type: integer
                  minimum: 0
                  maximum: 65535
                  description: Number of children in the room
                  x-gitbook-description-html: <p>Number of children in the room</p>
              required:
                - adults
                - children
          x-gitbook-description-html: >-
            <p>Use the rooms list to specify exact occupants in each room.
            Provides more accurate pricing. Do not use this if searching by
            totalAdults, totalChildren &#x26; totalRooms.</p>
        - name: totalAdults
          description: >-
            Specify the total number of adults across all rooms. Must also
            specify totalRooms field. Do not use this if searching with the
            occupants rooms list.
          in: query
          schema:
            type: integer
            minimum: 0
            maximum: 655350
          x-gitbook-description-html: >-
            <p>Specify the total number of adults across all rooms. Must also
