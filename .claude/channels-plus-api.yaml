  /properties/{uuid}/reservations:
    post:
      operationId: createPendingReservation
      description: >-
        Create a pending reservation to lock in rates and availabilities for a
        specific property. This endpoint allows you to temporarily hold a
        reservation before confirming it, ensuring the rates and room
        availability are secured for a short period.
      parameters:
        - $ref: '#/components/parameters/SmApiId'
        - $ref: '#/components/parameters/SmApiKey'
        - name: uuid
          description: >-
            The unique identifier of the property for which the reservation is
            being made
          required: true
          in: path
          schema:
            type: string
          x-gitbook-description-html: >-
            <p>The unique identifier of the property for which the reservation
            is being made</p>
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                checkin:
                  type: string
                  format: date
                  description: >-
                    The arrival date. Must be within 500 days in the future and
                    in the format yyyy-mm-dd.
                  x-gitbook-description-html: >-
                    <p>The arrival date. Must be within 500 days in the future
                    and in the format yyyy-mm-dd.</p>
                checkout:
                  type: string
                  format: date
                  description: >-
                    The departure date. Must be later than checkin. Must be
                    between 1 and 30 days after checkin. Must be within 500 days
                    in the future and in the format yyyy-mm-dd.
                  x-gitbook-description-html: >-
                    <p>The departure date. Must be later than checkin. Must be
                    between 1 and 30 days after checkin. Must be within 500 days
                    in the future and in the format yyyy-mm-dd.</p>
                dealCode:
                  type: string
                  nullable: true
                  description: >-
                    The code of any deal to be applied to the reservation. If
                    null, no deal will be applied.
                  x-gitbook-description-html: >-
                    <p>The code of any deal to be applied to the reservation. If
                    null, no deal will be applied.</p>
                netInvoicing:
                  type: boolean
                  default: false
                  description: >-
                    Indicates whether net invoicing should be applied to the
                    reservation.
                  x-gitbook-description-html: >-
                    <p>Indicates whether net invoicing should be applied to the
                    reservation.</p>
                rooms:
                  type: array
                  description: >-
                    An array of room bookings for this reservation. Minimum 1,
                    maximum 10 rooms.
                  items:
                    type: object
                    additionalProperties: false
                    properties:
                      roomRateUuid:
                        type: string
                        maxLength: 36
                        description: >-
                          The unique identifier for the specific room rate being
                          booked.
                        x-gitbook-description-html: >-
                          <p>The unique identifier for the specific room rate
                          being booked.</p>
                      adults:
                        type: integer
                        minimum: 0
                        maximum: 255
                        description: The number of adults for this room booking.
                        x-gitbook-description-html: <p>The number of adults for this room booking.</p>
                      children:
                        type: integer
                        minimum: 0
                        maximum: 255
                        description: The number of children for this room booking.
                        x-gitbook-description-html: <p>The number of children for this room booking.</p>
                      applyDeal:
                        type: boolean
                        nullable: true
                        description: >-
                          Indicates whether to apply the deal (if any) to this
                          specific room booking.
                        x-gitbook-description-html: >-
                          <p>Indicates whether to apply the deal (if any) to
                          this specific room booking.</p>
                    required:
                      - roomRateUuid
                      - adults
                      - children
                  minItems: 1
                  maxItems: 10
                  x-gitbook-description-html: >-
                    <p>An array of room bookings for this reservation. Minimum
