version: "1"
name: mido-client-pipeline
description: >
  mido-client (Spring Boot YAML-driven RestClient 라이브러리)용 통합 개발 파이프라인.
  dev_agent → test_agent → quality_agent → security_agent 순서로 실행됨.

stages:
  - name: development
    description: "기능 개발 및 리팩터링"
    skill: dev_agent
    tasks:
      - "요청된 기능을 Spring-First 기준으로 개발 (RestClient / Auto-Configuration 우선 활용)"
      - "리팩터링 및 컨벤션 점검 (Properties · Factory · Interceptor · ChannelContext 구조 유지)"
      - "CLAUDE.md 규칙에 따라 구현 계획 제시 후 코드 작성"
    on_success:
      - trigger: testing
    on_failure:
      - message: "dev_agent failure."

  - name: testing
    description: "테스트 코드 작성 및 실행"
    skill: test_agent
    tasks:
      - "JUnit 기반 단위 테스트 작성"
      - "ApplicationContextRunner 기반 Auto-Configuration 검증"
      - "MockRestServiceServer / WireMock 등으로 HTTP 통신 검증"
      - "커버리지 80% 이상 목표 (Auto-Configuration · Factory · Interceptor 핵심 경로)"
      - "빌드 실행 및 테스트 통과 확인 (./gradlew test)"
    on_success:
      - trigger: quality
    on_failure:
      - message: "test_agent failure."

  - name: quality
    description: "품질 검증 및 코드 리뷰"
    skill: quality_agent
    tasks:
      - "SonarLint, IntelliJ 경고, 코드 스멜 점검"
      - "리팩터링 권장사항 요약 및 제안"
      - "mido-client 컨벤션 불일치 코드 식별 (Lombok 순서 · @ConfigurationProperties · @ConditionalOn* 사용)"
    on_success:
      - trigger: security
    on_failure:
      - message: "quality_agent failure."

  - name: security
    description: "보안 점검 및 취약성 검증"
    skill: security_agent
    tasks:
      - "인증 헤더(Bearer / Basic / API Key) 및 토큰의 로그 노출 여부 검사"
      - "Interceptor / Logging 경로에서 자격증명 누수 가능성 검사"
      - "YAML 기본값 · 예제 코드에 실제 토큰/시크릿 하드코딩 여부 검사"
      - "사용자 입력(YAML properties) 검증 (@Valid · URL 형식 등) 확인"
    on_success:
      - message: "security_agent success."
    on_failure:
      - message: "security_agent failure."

rules:
  stop_on_failure: true
  require_approval_before_next_stage: true
  logging:
    level: info
    output: .claude/logs/pipeline.log
    format: "[%(asctime)s] [%(levelname)s] %(message)s"
  notifications:
    on_start: "mido-client pipeline start."
    on_complete: "mido-client pipeline success."
    on_failure: "mido-client pipeline failure."

